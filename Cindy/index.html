<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:sans-serif;
  color:#fff;
  text-align:center;
}

/* 外框 */
.container{
  animation:fadeIn 1s ease;
}

/* 轉圈動畫 */
.loader{
  width:60px;
  height:60px;
  border:5px solid rgba(255,255,255,0.2);
  border-top:5px solid #00eaff;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 20px;
}

/* 文字動畫 */
.text{
  font-size:18px;
  letter-spacing:1px;
  opacity:0;
  animation:fadeText 1.5s ease forwards;
}

/* 動畫 */
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeText{
  to{opacity:1;}
}
</style>

<script>
window.onload = function() {
  setTimeout(function(){
    window.location.href = "Cindy.vcf";
  }, 800); // 延遲0.8秒讓動畫顯示
}
</script>

</head>

<body>

<div class="container">
  <div class="loader"></div>
  <div class="text">正在為您建立聯絡人...</div>
</div>

</body>
</html>

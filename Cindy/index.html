<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- ✅ 關鍵：手機自適應 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:#fff;
  text-align:center;
}

/* 容器 */
.container{
  width:90%;
  max-width:400px;
  animation:fadeIn 0.8s ease;
}

/* 轉圈 */
.loader{
  width:80px;
  height:80px;
  border:6px solid rgba(255,255,255,0.2);
  border-top:6px solid #00eaff;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 30px;
}

/* 文字（重點放大🔥） */
.text{
  font-size:22px;
  font-weight:500;
  letter-spacing:1px;
  line-height:1.6;
  opacity:0;
  animation:fadeText 1.2s ease forwards;
}

/* 小字 */
.sub{
  font-size:14px;
  opacity:0.7;
  margin-top:10px;
}

/* 動畫 */
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeText{
  to{opacity:1;}
}
</style>

<script>
window.onload = function() {
  setTimeout(function(){
    window.location.href = "Cindy.vcf";
  }, 800);
}
</script>

</head>

<body>

<div class="container">
  <div class="loader"></div>

  <div class="text">
    正在為您建立聯絡人
  </div>

  <div class="sub">
    請稍候...
  </div>
</div>

</body>
</html>

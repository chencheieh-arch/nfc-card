/************** 掃描動畫 **************/
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,#0a0a0a,#000);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
color:#d4af37;
font-size:14px;
letter-spacing:2px;
}

.scan-ring{
width:90px;
height:90px;
border-radius:50%;
border:2px solid rgba(212,175,55,.3);
position:relative;
animation:pulse 1.5s infinite;
}

.scan-ring::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border-radius:50%;
border-top:2px solid #d4af37;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

@keyframes pulse{
0%{transform:scale(.9);opacity:.5}
50%{transform:scale(1.1);opacity:1}
100%{transform:scale(.9);opacity:.5}
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin:12px 0;
padding:14px;
border-radius:14px;
text-decoration:none;
font-size:16px;
}
.info a{color:inherit;text-decoration:none}
</style>

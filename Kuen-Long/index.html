
<!DOCTYPE html>

<style>

body{margin:0;font-family:sans-serif;background:#000;color:#fff}
.card{background:#111;border-radius:22px;padding:32px;max-width:420px;margin:auto;
box-shadow:0 30px 60px rgba(0,0,0,.8);text-align:center}
.name{font-size:28px;color:#d4af37;margin-top:6px}
.company{margin-top:14px;color:#ccc}
.title{margin-top:6px;color:#aaa}
.info{margin-top:12px;color:#bbb}
.contact{background:linear-gradient(135deg,#d4af37,#b8962e);color:#000}
.web{background:#f8f3e5}
.line{background:#06C755}
.fb{background:#1877F2}
.ig{background:linear-gradient(45deg,#833AB4,#FD1D1D,#FDCB58)}


/************** 掃描動畫 **************/
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,#0a0a0a,#000);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
color:#d4af37;
font-size:14px;
letter-spacing:2px;
}

.scan-ring{
width:90px;
height:90px;
border-radius:50%;
border:2px solid rgba(212,175,55,.3);
position:relative;
animation:pulse 1.5s infinite;
}

.scan-ring::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border-radius:50%;
border-top:2px solid #d4af37;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

@keyframes pulse{
0%{transform:scale(.9);opacity:.5}
50%{transform:scale(1.1);opacity:1}
100%{transform:scale(.9);opacity:.5}
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin:12px 0;
padding:14px;
border-radius:14px;
text-decoration:none;
font-size:16px;
}
.btn img{width:20px;height:20px}
.info a{color:inherit;text-decoration:none}
</style>
</head>

<body>

<!-- 掃描動畫 -->
<div id="loading">
  <div class="scan-ring"></div>
  <div style="margin-top:20px;">NFC 掃描中</div>
</div>

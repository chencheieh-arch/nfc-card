<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小葵🌻 | 專業主持 ‧ 平面模特</title>
    <!-- 引入 Google 字體：思源宋體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- 引入 FontAwesome 圖示庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #F4ECF7; /* 柔和淺紫底色 */
            --card-bg: #FFFFFF;
            --text-main: #4A4A4A;
            --text-sub: #888888;
            --accent-color: #B098D1; /* 優雅紫羅蘭點綴 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(176, 152, 209, 0.15); /* 帶有一點紫色調的陰影 */
            text-align: center;
        }

        /* 大頭貼照 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        /* 姓名與職稱 */
        .name {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
            color: #333;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 25px;
            letter-spacing: 1.5px;
        }

        /* 營業項目區塊 */
        .services-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .services-title::before,
        .services-title::after {
            content: '';
            height: 1px;
            width: 30px;
            background-color: var(--accent-color);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tag {
            background-color: #FDFBFF;
            color: var(--text-main);
            border: 1px solid #EBE3F2;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .tag:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* 聯絡資訊明細區塊 */
        .contact-info {
            background-color: #FAFAFA;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid #F0F0F0;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--text-main);
            font-family: sans-serif; /* 數字英文用黑體較清晰 */
        }

        .contact-item:last-child {
            margin-bottom: 0;
        }

        .contact-item i {
            width: 24px;
            color: var(--accent-color);
            margin-right: 12px;
            text-align: center;
            font-size: 16px;
        }

        .contact-item a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s;
            letter-spacing: 0.5px;
        }

        .contact-item a:hover {
            color: var(--accent-color);
        }

        /* 社群與聯絡按鈕區塊 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: sans-serif;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .btn i {
            font-size: 20px;
            margin-right: 12px;
        }

        /* LINE 按鈕 */
        .btn-line {
            background-color: #06C755;
            color: white;
        }

        /* IG 按鈕 */
        .btn-ig {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }

        /* FB 按鈕 */
        .btn-fb {
            background-color: #1877F2;
            color: white;
        }

        /* 頁腳 */
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #AAAAAA;
            font-family: sans-serif;
        }

    </style>
</head>

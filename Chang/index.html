<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    font-family:sans-serif;
    color:#fff;
}

.card{
    text-align:center;
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

.loader{
    border:5px solid rgba(255,255,255,0.2);
    border-top:5px solid #fff;
    border-radius:50%;
    width:60px;
    height:60px;
    margin:0 auto 20px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00c300;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <div class="loader"></div>
    <h2>正在下載名片中…</h2>
    <p>稍後為您提供 LINE 好友資訊</p>

    <button onclick="manualStart()">若未自動下載，點我繼續</button>
</div>

<script>

let downloaded = false;

function forceDownload(url, filename){
    fetch(url)
    .then(res=>res.blob())
    .then(blob=>{
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(blobUrl);

        downloaded = true;
    })
    .catch(()=>{});
}

// 自動流程
forceDownload("https://raw.githubusercontent.com/chencheieh-arch/nfc-card/main/images/Shih-Chang.png","Shih-Chang.png");

// 延長等待時間（避免太快跳走）
setTimeout(()=>{
    window.location.href = "https://line.me/ti/p/VqDesvn3ys";
}, 5000);


// 手動觸發（100%成功）
function manualStart(){
    forceDownload("https://raw.githubusercontent.com/chencheieh-arch/nfc-card/main/images/Shih-Chang.png","Shih-Chang.png");

    setTimeout(()=>{
        window.location.href = "https://line.me/ti/p/VqDesvn3ys";
    }, 1500);
}

</script>

</body>
</html>
